name: Weekly Kids Course Scraper

on:
  schedule:
    - cron: '0 8 * * 1'  # UTC 时间，每周一 8:00
  workflow_dispatch:  # 可以手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai pandas selenium

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scrape_courses.py

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add courses_*.md
          git commit -m "Update weekly courses"
          git push
