name: Weekly Kids Courses Scraper

# 每周定时触发，也可以手动触发
on:
  schedule:
    - cron: '0 15 * * 1'  # UTC 时间，每周一 15:00 (对应美国周日/周一本地时间可调整)
  workflow_dispatch:      # 手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai

      # 4️⃣ 运行抓取脚本
      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}       # 如果用邮件通知
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}       # 如果用邮件通知
        run: python scrape_courses.py

      # 5️⃣ 提交并推送生成的 Markdown
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add courses_*.md courses_history.json
          git commit -m "Update weekly courses" || echo "No changes to commit"
          git push
